name: .NET

on:
  push:
    branches: [ "dev", "main" ]

  pull_request:
    branches: [ "dev", "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: zulu
        java-version: 17

    - name: Install SonarScanner
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Add .NET tools to PATH
      run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Restore dependencies
      run: dotnet restore

    - name: SonarCloud Begin Analysis
      run: |
        dotnet sonarscanner begin \
          /k:"TiendaMusica-ms-product" \
          /o:"jcadavid52" \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
          /d:sonar.qualitygate.wait=true \
          /d:sonar.exclusions="**/bin/**,**/obj/**,**/Migrations/**"

    - name: Build project
      run: dotnet build --no-restore --configuration Release

    - name: Run tests with coverage
      run: |
        dotnet test \
          --no-build \
          --configuration Release \
          --collect:"XPlat Code Coverage" \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

    - name: Find coverage files
      run: find . -name "coverage.opencover.xml"

    - name: SonarCloud End Analysis
      run: |
        dotnet sonarscanner end \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./src/TiendaMusica.Runner/Dockerfile
        push: true
        tags: |
          ghcr.io/jcadavid52/tiendamusica-ms-product:latest
          ghcr.io/jcadavid52/tiendamusica-ms-product:${{ github.sha }}
